<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

/* THIS IS THE REAL FIX */
.container {
  position: relative;
  width: 500px;   /* increase size */
}

/* background */
.bg {
  width: 100%;
  display: block;
}

/* icons */
.icon {
  position: absolute;
  width: 70px;
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.15);
}

/* BETTER POSITIONS */
.letter { top: 8%; left: 6%; }
.card { top: 8%; right: 6%; }

.travel { top: 40%; left: 10%; }
.music { top: 38%; right: 10%; }

.ticket { top: 60%; left: 12%; }
.photostrip { top: 58%; right: 10%; }

</style>
</head>

<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background(2).png" class="bg">

  <!-- ICONS -->
  <a href="letter.html"><img src="letter.png" class="icon letter"></a>
  <a href="pass.html"><img src="card.png" class="icon card"></a>

  <a href="travel.html"><img src="travel.png" class="icon travel"></a>
  <a href="music.html"><img src="music.png" class="icon music"></a>

  <a href="movies.html"><img src="ticket.png" class="icon ticket"></a>
  <a href="photobooth.html"><img src="photostrip.png" class="icon photostrip"></a>

</div>

</body>
</html>
