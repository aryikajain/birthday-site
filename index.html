<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

/* MAIN FRAME (VERY IMPORTANT) */
.container {
  position: relative;
  width: 400px;   /* FIXED WIDTH = NO BREAKING */
}

/* BACKGROUND IMAGE */
.bg {
  width: 100%;
  display: block;
}

/* CENTER PHOTO */
.center {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90px;
  border-radius: 50%;
}

/* ICON STYLE */
.icon {
  position: absolute;
  width: 50px;
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.2);
}

/* EXACT POSITIONS (NOW WILL WORK PERFECT) */

.letter { top: 12%; left: 5%; }
.card { top: 12%; right: 5%; }

.travel { top: 45%; left: 8%; }
.music { top: 45%; right: 8%; }

.ticket { top: 65%; left: 12%; }
.photostrip { top: 65%; right: 10%; }

</style>
</head>

<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background.png" class="bg">

  <!-- CENTER -->
  <img src="background(2).png" class="center">

  <!-- ICONS -->
  <a href="letters.html"><img src="letters.png" class="icon letter"></a>
  <a href="pass.html"><img src="card.png" class="icon card"></a>

  <a href="travel.html"><img src="travel.png" class="icon travel"></a>
  <a href="music.html"><img src="music.png" class="icon music"></a>

  <a href="movies.html"><img src="ticket.png" class="icon ticket"></a>
  <a href="photobooth.html"><img src="photostrip.png" class="icon photostrip"></a>

</div>

</body>
</html>
