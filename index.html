<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
}

/* CENTERED CANVAS (keeps your design intact) */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* BACKGROUND — NO CROP */
.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ICON STYLE */
.icon {
  position: absolute;
  width: 10vw;
  min-width: 90px;
  max-width: 160px;
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.15);
}

/* POSITIONS (tuned to your layout) */
.letter { top: 11%; left: 7%; }
.card { top: 11%; right: 7%; }

.travel { top: 43%; left: 9%; }
.music { top: 40%; right: 11%; }

.ticket { top: 66%; left: 13%; }
.photostrip { top: 58%; right: 9%; }

</style>
</head>
<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background.png" class="bg">

  <!-- ICONS -->
  <a href="letter.html">
    <img src="letters.png" class="icon letter">
  </a>

  <a href="pass.html">
    <img src="card.png" class="icon card">
  </a>

  <a href="travel.html">
    <img src="travel.png" class="icon travel">
  </a>

  <a href="music.html">
    <img src="music.png" class="icon music">
  </a>

  <a href="movies.html">
    <img src="ticket.png" class="icon ticket">
  </a>

  <a href="photobooth.html">
    <img src="photostrip.png" class="icon photostrip">
  </a>

</div>

</body>
</html>
