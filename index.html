<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

/* MAIN DESIGN FRAME */
.container {
  position: relative;
  width: 600px;
}

/* BACKGROUND IMAGE */
.bg {
  width: 100%;
  display: block;
}

/* ICON STYLE */
.icon {
  position: absolute;
  width: 80px;
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.15);
}

/* EXACT POSITIONS (MATCH YOUR IMAGE) */

.letter {
  top: 12%;
  left: 6%;
}

.card {
  top: 12%;
  right: 6%;
}

.travel {
  top: 42%;
  left: 8%;
}

.music {
  top: 38%;
  right: 10%;
}

.ticket {
  top: 65%;
  left: 12%;
}

.photostrip {
  top: 55%;
  right: 8%;
}

</style>
</head>

<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background.png" class="bg">

  <!-- ICONS -->
  <a href="letter.html">
    <img src="letters.png" class="icon letter">
  </a>

  <a href="pass.html">
    <img src="card.png" class="icon card">
  </a>

  <a href="travel.html">
    <img src="travel.png" class="icon travel">
  </a>

  <a href="music.html">
    <img src="music.png" class="icon music">
  </a>

  <a href="movies.html">
    <img src="ticket.png" class="icon ticket">
  </a>

  <a href="photobooth.html">
    <img src="photostrip.png" class="icon photostrip">
  </a>

</div>

</body>
</html>
