<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
}

/* FULL SCREEN CONTAINER */
.container {
  position: relative;
  width: 100%;
  max-width: 1000px;
  margin: auto;
}

/* BACKGROUND FULL WIDTH */
.bg {
  width: 100%;
  height: auto;
  display: block;
}

/* ICON STYLE */
.icon {
  position: absolute;
  width: 6vw;   /* responsive size */
  max-width: 80px;
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.15);
}

/* PERFECT POSITIONS (based on your image layout) */

.letter { top: 10%; left: 8%; }
.card { top: 10%; right: 8%; }

.travel { top: 48%; left: 10%; }
.music { top: 45%; right: 12%; }

.ticket { top: 70%; left: 14%; }
.photostrip { top: 65%; right: 10%; }

</style>
</head>

<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background(2).png" class="bg">

  <!-- ICONS -->
  <a href="letter.html"><img src="letters.png" class="icon letter"></a>
  <a href="pass.html"><img src="card.png" class="icon card"></a>

  <a href="travel.html"><img src="travel.png" class="icon travel"></a>
  <a href="music.html"><img src="music.png" class="icon music"></a>

  <a href="movies.html"><img src="ticket.png" class="icon ticket"></a>
  <a href="photobooth.html"><img src="photostrip.png" class="icon photostrip"></a>

</div>

</body>
</html>
