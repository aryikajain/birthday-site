<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
}

/* CENTERED DESIGN */
.container {
  position: relative;
  max-width: 900px;
  margin: auto;
}

/* BACKGROUND (NO CROPPING) */
.bg {
  width: 100%;
  height: auto;
  display: block;
}

/* ICON STYLE (FIXED) */
.icon {
  position: absolute;
  width: 120px;   /* FIXED SIZE */
  cursor: pointer;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.15);
}

/* POSITIONS (TUNED) */
.letter { top: 11%; left: 6%; }
.card { top: 11%; right: 6%; }

.travel { top: 43%; left: 8%; }
.music { top: 40%; right: 10%; }

.ticket { top: 66%; left: 12%; }
.photostrip { top: 58%; right: 8%; }

</style>
</head>

<body>

<div class="container">

  <!-- BACKGROUND -->
  <img src="background.png" class="bg">

  <!-- ICONS -->
  <a href="letter.html">
    <img src="letter.png" class="icon letter">
  </a>

  <a href="pass.html">
    <img src="card.png" class="icon card">
  </a>

  <a href="travel.html">
    <img src="travel.png" class="icon travel">
  </a>

  <a href="music.html">
    <img src="music.png" class="icon music">
  </a>

  <a href="movies.html">
    <img src="ticket.png" class="icon ticket">
  </a>

  <a href="photobooth.html">
    <img src="photostrip.png" class="icon photostrip">
  </a>

</div>

</body>
</html>
